name: Build and push to Docker Hub

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - '.github/workflows/build.yml'
      - 'dbr-17.3-lts-requirements.txt'
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile'
      - '.github/workflows/build.yml'
      - 'dbr-17.3-lts-requirements.txt'
  workflow_dispatch:  # allow manual runs from the Actions tab

# Least-privilege token.
permissions:
  contents: read

# Cancel superseded runs on the same branch/PR — saves CI minutes and
# avoids two builds racing to write the same cache.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          # GitHub runners have ~14 GB free; this image build needs more headroom
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          # Build on PRs to validate the Dockerfile, but only push on main.
          push: ${{ github.event_name != 'pull_request' }}
          tags: thardianto/r-methylation:17.3-LTS
          cache-from: type=gha
          cache-to: type=gha,mode=max